version: "3.9"
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: fx
      POSTGRES_PASSWORD: fx
      POSTGRES_DB: fx
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fx -d fx"]
      interval: 2s
      timeout: 3s
      retries: 20
    volumes:
      - pgdata:/var/lib/postgresql/data

  fx-hedging:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: "8080"
      GRPC_PORT: "9090"
      DB_URL: "postgres://fx:fx@postgres:5432/fx?sslmode=disable"
      HEDGE_RATIO_TARGET: "0.90"
      MAX_OPEN_EXPOSURE_USD: "1000000"
      SLIPPAGE_ALERT_BPS: "5"
      EXPOSURE_REFRESH_INTERVAL_MS: "1000"
      LOG_LEVEL: "info"
    ports:
      - "8080:8080"
      - "9090:9090"

volumes:
  pgdata: